# Docker Swarm + Traefik (VPS Projecont)
# Antes do deploy: substituir USUARIO, SENHA e confirmar host do Postgres (docker service ls | grep postgres).
# Base dedicada ao OS (ex.: chamados_os), nunca a base do Contábil Pro.
# JWT_SECRET e WEBHOOK_SECRET devem coincidir com a API do Contábil Pro.
#
# Deploy: docker stack deploy -c stack-os.yml sistema-os

version: "3.8"

services:
  os_web:
    image: sistema-os:local
    environment:
      DATABASE_URL: "postgresql://USUARIO:SENHA@postgres_postgres:5432/chamados_os"
      AUTH_SECRET: "cole_openssl_rand_base64_32"
      NEXTAUTH_URL: "https://tickets.pktech.ai"
      JWT_SECRET: "MESMO_JWT_DA_API_CONTABIL_PRO"
      WEBHOOK_SECRET: "MESMO_WEBHOOK_DA_API_CONTABIL_PRO"
      NEXT_PUBLIC_CONTABIL_LOGIN_URL: "https://contabil-pro-v2.pktech.ai/login"
      CRON_SECRET: "d03124fc672774c1b6a00300ff530fcdfaf8368bf7fc98c038857ecec75c9c0c"
      VAPID_PUBLIC_KEY: "BORx3o9jmZHe1RDDMBUAbl0kG1tNYirlcoD_CYijPzOc0nqO2bG0tUP4jDSn0g2i-WteS2rtAJf4cvX-AmU69jM"
      VAPID_PRIVATE_KEY: "DQgASfnqWihmNlCKPi-qKtCL-FfLMmX6KKpihEg4IZk"
      VAPID_SUBJECT: "mailto:admin@pktech.ai"
      NEXT_PUBLIC_VAPID_PUBLIC_KEY: "BORx3o9jmZHe1RDDMBUAbl0kG1tNYirlcoD_CYijPzOc0nqO2bG0tUP4jDSn0g2i-WteS2rtAJf4cvX-AmU69jM"
      NODE_ENV: production
    networks:
      - projecont_net
    deploy:
      replicas: 1
      labels:
        - traefik.enable=true
        - traefik.http.routers.os-web.rule=Host(`tickets.pktech.ai`)
        - traefik.http.routers.os-web.entrypoints=web,websecure
        - traefik.http.routers.os-web.tls.certresolver=letsencryptresolver
        - traefik.http.services.os-web.loadbalancer.server.port=3000

networks:
  projecont_net:
    external: true
    name: ProjecontNet
